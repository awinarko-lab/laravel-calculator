name: Claude Issue Solver

on:
  issues:
    types: [labeled]

jobs:
  solve-issue:
    runs-on: self-hosted
    if: contains(github.event.label.name, 'claude')
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm i
          npm run build

      - name: Copy Environment File
        run: cp .env.example .env && php artisan key:generate

      - name: Save issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "$ISSUE_BODY" > /tmp/issue-body.md

      - name: Solve issue with Claude Code
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TYPE="${{ github.event.issue.user.login }}"
          BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"

          # Create a new branch (force to overwrite if re-run)
          git checkout -B "$BRANCH_NAME"

          # Run Claude Code to solve the issue
          claude -p "You are Claude Code, an autonomous coding agent. You are working on a Laravel project.

          ## Your Workflow
          1. Read AGENTS.md and CLAUDE.md for project context, conventions, and rules
          2. Read the issue file at /tmp/issue-body.md to understand the task
          3. Explore the codebase to understand the current structure
          4. Plan your changes before implementing
          5. Implement the changes following existing code conventions
          6. Run tests with ./vendor/bin/pest to verify your changes
          7. Fix any failing tests
          8. Commit your changes with a descriptive conventional commit message

          ## Issue Details
          Title: ${ISSUE_TITLE}
          Issue #${ISSUE_NUMBER}
          Author: @${ISSUE_TYPE}

          ## Important Rules
          - Follow existing code patterns and conventions found in the codebase
          - Do NOT modify files unrelated to the issue
          - Do NOT create a pull request
          - Do NOT run composer install or npm install (already done)
          - Write tests for any new functionality
          - Run tests before committing to ensure nothing is broken
          - Use conventional commit format: feat:, fix:, refactor:, docs:, etc." --allowedTools "Bash(git*)" "Bash(php*)" "Bash(composer*)" "Bash(npm*)" "Bash(./vendor/bin/pest)" "Bash(cat*)" "Bash(ls*)" "Bash(find*)" "Bash(grep*)" "Read" "Write" "Edit"

          # Push the branch (force push to overwrite if re-run)
          git push origin "$BRANCH_NAME" --force

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"

          # Get the commit message for PR body
          COMMIT_MSG=$(git log -1 --pretty=%B)

          gh pr create \
            --title "feat: ${ISSUE_TITLE} (fixes #${ISSUE_NUMBER})" \
            --body "## Summary
          Resolves #${ISSUE_NUMBER}

          ## Issue
          ${ISSUE_TITLE}

          ## Changes
          ${COMMIT_MSG}

          ---
          This PR was auto-generated by Claude Code." \
            --base master \
            --head "$BRANCH_NAME"

      - name: Remove label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --remove-label "claude"
