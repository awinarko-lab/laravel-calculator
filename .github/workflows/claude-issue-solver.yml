name: Claude Issue Solver

on:
  issues:
    types: [labeled]

jobs:
  solve-issue:
    runs-on: self-hosted
    if: contains(github.event.label.name, 'claude')
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Solve issue with Claude Code
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"

          # Create a new branch
          git checkout -b "$BRANCH_NAME"

          # Run Claude Code to solve the issue
          claude -p "You are working on a Laravel project. Read the AGENTS.md and CLAUDE.md files first for project context.

          Solve this GitHub issue:
          Title: ${ISSUE_TITLE}
          Body: ${ISSUE_BODY}

          Instructions:
          - Analyze the issue and understand what needs to be done
          - Implement the fix/feature
          - Run tests to verify your changes work
          - Commit your changes with a descriptive message

          Do NOT create a pull request. Just commit the changes." --allowedTools "Bash(git*)" "Bash(php*)" "Bash(composer*)" "Bash(npm*)" "Bash(./vendor/bin/pest)" "Read" "Write" "Edit"

          # Push the branch
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"

          # Get the commit message for PR body
          COMMIT_MSG=$(git log -1 --pretty=%B)

          gh pr create \
            --title "feat: ${ISSUE_TITLE} (fixes #${ISSUE_NUMBER})" \
            --body "## Summary
          Resolves #${ISSUE_NUMBER}

          ## Issue
          ${ISSUE_TITLE}

          ## Changes
          ${COMMIT_MSG}

          ---
          This PR was auto-generated by Claude Code." \
            --base master \
            --head "$BRANCH_NAME"

      - name: Remove label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --remove-label "claude"
